<article class="masterpiece  @@theme  @@flipClass">

  <div class="masterpiece__img">
    <!-- После выяснения поведения изображение пересчитать размер -->
    <picture>
      <source srcset="img/@@img.webp" media="(min-width: 768px)" type="image/webp">
      <source srcset="img/@@img.jpg" media="(min-width: 768px)">
      <!-- 1152x1014 -->
      <source srcset="img/@@imgMob.webp" media="(min-width: 480px)" type="image/webp">
      <source srcset="img/@@imgMob.jpg" media="(min-width: 480px)">
      <!-- 1152x1014 -->
      <source srcset="img/@@imgMob.webp" media="(min-width: 300px)" type="image/webp">
      <source srcset="img/@@imgMob.jpg" media="(min-width: 300px)">
      <!-- 720x1014 -->
      <img src="img/@@img.jpg" width="1440" height="940" alt="Alt" loading="lazy">
    </picture>
    <!-- loading="lazy" для всех кроме первого -->
  </div>

  <div class="container  masterpiece__text-container">
    <div class="row  masterpiece__row">
      <div class="masterpiece__text-col">
        <div class="masterpiece__text">
          <h2 class="masterpiece__title">@@title</h2>
          <div class="masterpiece__descr">@@text</div>

          <a href="#" class="btn  btn__link  masterpiece__link">
            <span>Перейти</span>
          </a>
        </div>
      </div>
    </div>
  </div>

</article>
